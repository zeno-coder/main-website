<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | ZenoX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar (Same as index) -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">ZENOX</a>
        </div>
    </nav>

    <!-- Contact Hero -->
    <section class="contact-hero">
        <div class="container">
            <h1 class="contact-title">Let’s Build The Future</h1>
            <p class="contact-subtitle">
                Tell us about your vision. We’ll turn it into reality.
            </p>
        </div>
    </section>

    <!-- Contact Form Section -->
    <section id="email-section" class="contact-form-section">
        <div class="container">
            <div class="contact-form-box">
                <form id="contactForm">
    <div class="form-group">
        <input type="text" id="name" placeholder="Your Name" required>
    </div>

    <div class="form-group">
        <input type="email" id="email" placeholder="Your Email" required>
    </div>

    <div class="form-group">
        <input type="text" id="project" placeholder="Project Type">
    </div>

    <div class="form-group">
        <textarea id="message" rows="6" placeholder="Tell us about your project..." required></textarea>
    </div>

    <button type="submit" class="contact-btn">Send Message</button>
</form>
            </div>
        </div>
    </section>
    <section class="contact-direct">
    <div class="container">
        <div class="contact-direct-grid">

            <!-- Email Card -->
<a href="javascript:void(0)" id="emailCard" class="contact-card">
    <h3>Email Us</h3>
    <p>zeno35920@gmail.com</p>
</a>

            <!-- Instagram Card -->
            <a href="https://instagram.com/lynx_r_r" target="_blank" class="contact-card">
                <h3>Instagram</h3>
                <p>@lynx_r_r</p>
            </a>

        </div>
    </div>
</section>
<script>
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    var name = document.getElementById("name").value;
    var email = document.getElementById("email").value;
    var project = document.getElementById("project").value;
    var message = document.getElementById("message").value;

    var whatsappMessage = 
        "🚀 *New Project Inquiry - ZENOX* %0A%0A" +
        "*Name:* " + name + "%0A" +
        "*Email:* " + email + "%0A" +
        "*Project Type:* " + project + "%0A%0A" +
        "*Message:* %0A" + message;

    var whatsappURL = "https://wa.me/919496636231?text=" + whatsappMessage;

    window.open(whatsappURL, "_blank");
});
</script>
<script>
document.getElementById("emailCard").addEventListener("click", function() {
    const section = document.getElementById("email-section");
    const nameInput = document.getElementById("name");

    // Smooth scroll
    section.scrollIntoView({ behavior: "smooth" });

    // Focus name input and glow effect after scroll
    setTimeout(() => {
        nameInput.focus();
        section.classList.add("highlight-section");

        setTimeout(() => {
            section.classList.remove("highlight-section");
        }, 1500);
    }, 600);
});
</script>
</body>
</html>
